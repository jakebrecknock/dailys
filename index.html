<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ADB Daily Workforce Reports</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <h1>ADB</h1>

        </div>

        <div class="sidebar-nav">

            <button class="nav-button active">
                Dashboard
            </button>

            <button class="nav-button">
                Daily Reports
            </button>

            <button class="nav-button">
                Rosters
            </button>

            <button class="nav-button">
                Compiled Report
            </button>

            <button class="nav-button">
                Settings
            </button>

        </div>

    </aside>


    <!-- MAIN -->

    <main class="main-content">

        <!-- HEADER -->

        <header class="header">

            <div>

                <h1 class="title">
                    Daily Workforce Reports
                </h1>

                <p class="subtitle">
                    Manager crew activity reporting
                </p>

            </div>

            <div class="header-right">

                <div class="date-block">

                    <label>

                        Report Date

                    </label>

                    <input
                            type="date"
                            id="dateInput">

                </div>

                <button id="previewReportBtn">

                    Compiled Report

                </button>

            </div>

        </header>


        <!-- STATS -->

        <section class="stats-row">

            <div class="stat-card">

                <p class="stat-title">

                    REPORT STATUS

                </p>

                <h2 id="completionText">

                    0 / 8

                </h2>

                <span>

                    Submitted

                </span>

            </div>


            <div class="stat-card">

                <p class="stat-title">

                    COMPLETE

                </p>

                <h2 class="green">

                    0

                </h2>

            </div>


            <div class="stat-card">

                <p class="stat-title">

                    MISSING

                </p>

                <h2 class="orange">

                    8

                </h2>

            </div>


            <div class="stat-card">

                <p class="stat-title">

                    OVERDUE

                </p>

                <h2 class="red">

                    0

                </h2>

            </div>

        </section>


        <!-- MANAGERS -->

        <section>

            <h2 class="section-title">

                Managers

            </h2>

            <div
                    id="managerGrid"
                    class="manager-grid">

            </div>

        </section>


    </main>

</div>

<script src="app.js"></script>

</body>
</html>
